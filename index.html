<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellnessProductHub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #222;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: #ffffff;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #2e7d32;
}

.nav-links a {
  margin-left: 15px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 500px;
  background-image: url('hero.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* OVERLAY ESCURO (melhora leitura) */
.hero::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
}

/* TEXTO */
.hero-text {
  position: relative;
  color: white;
  text-align: center;
  max-width: 600px;
  padding: 20px;
}

.hero-text h1 {
  font-size: 32px;
}

.hero-text p {
  font-size: 18px;
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 25px;
  background: #2e7d32;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

/* FEATURES */
.features {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 30px;
  background: #f5f5f5;
}

.feature {
  width: 220px;
  margin: 10px;
  text-align: center;
}

/* FOOTER */
.footer {
  background: #0a2540;
  color: white;
  text-align: center;
  padding: 20px;
}

.footer a {
  color: #ccc;
  margin: 0 10px;
  text-decoration: none;
  font-size: 14px;
}

/* 📱 MOBILE AJUSTE */
@media (max-width: 768px) {

  .hero {
    height: auto;
    background-size: contain;
    background-position: top center;
    padding-top: 60%; /* mantém proporção da imagem */
  }

  .hero-text h1 {
    font-size: 22px;
  }

  .hero-text p {
    font-size: 16px;
  }

  .nav-links a {
    margin-left: 10px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">WellnessProductHub</div>

  <div class="nav-links">
    <a href="our-mission.html">Our Mission</a>
    <a href="contact.html">Contact Us</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <!-- SE SUA IMAGEM JÁ TEM TEXTO, DEIXE ISSO VAZIO -->
  </div>
</div>

<!-- FEATURES -->
<div class="features">

  <div class="feature">
    <h3>Natural & Safe</h3>
    <p>Carefully selected wellness products.</p>
  </div>

  <div class="feature">
    <h3>Trusted Quality</h3>
    <p>Reliable and verified solutions.</p>
  </div>

  <div class="feature">
    <h3>Better Living</h3>
    <p>Support your health and vitality.</p>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <p>WellnessProductHub © 2026</p>

  <a href="our-mission.html">Our Mission</a>
  <a href="contact.html">Contact Us</a>
  <a href="privacy.html">Privacy Policy</a>
</div>

</body>
</html>
